<div class="app-root bg-slate-50 min-h-screen flex flex-col">
  <header class="h-16 brand-header flex items-center justify-between px-6 shrink-0 shadow-md">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 brand-logo rounded flex items-center justify-center font-bold text-lg">C</div>
      <h1 class="font-bold text-xl tracking-tight">ShadowIT Monitor</h1>
      <span class="text-[10px] px-2 py-1 rounded bg-[var(--brand-ecosystem-green)] text-white font-semibold tracking-wide">ANGULAR UI</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 px-3 py-1 brand-status rounded-full text-xs font-mono">
        <span [class]="statusIndicatorClass"></span>
        {{ phaseText }}
      </div>
      <button
        (click)="startIngestion()"
        [disabled]="isBusy"
        class="brand-button-primary text-sm font-medium px-4 py-2 rounded transition-colors disabled:opacity-60">
        {{ pipelineButtonLabel }}
      </button>
    </div>
  </header>

  <main class="flex-1 flex">
    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-6 gap-6 overflow-y-auto">
      <div>
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Live Metrics</h3>
        <div class="space-y-3">
          <div class="p-4 brand-panel-success rounded border">
            <div class="text-[var(--brand-ecosystem-green)] text-xs mb-1 font-bold">COMPLIANT</div>
            <div class="text-2xl font-bold text-slate-800 mono">{{ stats.found || 0 }}</div>
          </div>
          <div class="p-4 brand-panel-warning rounded border">
            <div class="text-[var(--brand-integrity-gold)] text-xs mb-1 font-bold">REVIEW (AI)</div>
            <div class="text-2xl font-bold text-slate-800 mono">{{ stats.review || 0 }}</div>
          </div>
          <div class="p-4 brand-panel-danger rounded border">
            <div class="text-[var(--brand-vibrant-red)] text-xs mb-1 font-bold">SHADOW IT</div>
            <div class="text-2xl font-bold text-slate-800 mono">{{ stats.notfound || 0 }}</div>
          </div>
        </div>
      </div>

      <div>
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Actions</h3>
        <div class="p-4 brand-panel-info rounded flex flex-col gap-2 border">
          <div class="text-[var(--brand-blueprint)] font-bold text-sm">{{ phaseText }}</div>
          <div class="text-[11px] text-slate-500">Last sync: {{ lastSyncLabel }}</div>
          <div *ngIf="!isPollingHealthy" class="text-[var(--brand-vibrant-red)]">Live polling degraded. Retrying…</div>
          <button
            (click)="triggerAI()"
            [disabled]="!canRunAi"
            class="w-full brand-button-alt text-xs font-bold py-2 rounded disabled:opacity-50">
            {{ aiButtonLabel }}
          </button>
          <button
            (click)="downloadResults()"
            class="w-full brand-button-alt text-xs font-bold py-2 rounded">
            Download Results
          </button>
        </div>
      </div>

      <div *ngIf="error" class="brand-error text-xs border rounded p-3">{{ error }}</div>
    </aside>

    <!-- Main content -->
    <section class="flex-1 flex flex-col bg-slate-50 p-6 min-w-0 overflow-y-auto">
      <!-- Tabs -->
      <div class="flex gap-6 mb-6 border-b border-slate-200">
        <button
          (click)="switchTab('dashboard')"
          [class.brand-tab-active]="currentTab === 'dashboard'"
          [class.brand-tab-inactive]="currentTab !== 'dashboard'"
          class="px-4 py-3 font-semibold text-sm">
          📊 Dashboard
        </button>
        <button
          (click)="switchTab('table')"
          [class.brand-tab-active]="currentTab === 'table'"
          [class.brand-tab-inactive]="currentTab !== 'table'"
          class="px-4 py-3 font-semibold text-sm">
          📋 Results
        </button>
      </div>

      <!-- Dashboard tab -->
      <div [class.hidden]="currentTab !== 'dashboard'" class="flex-1 overflow-y-auto">
        <!-- KPI cards + gap analysis + AI metrics -->
        <app-kpi-cards [kpi]="kpi" [isDashboardLoading]="isDashboardLoading" />

        <!-- Charts — [visible] lets the component re-init when the tab is shown -->
        <app-charts [chartData]="chartData" [visible]="currentTab === 'dashboard'" />
      </div>

      <!-- Results tab -->
      <div [class.hidden]="currentTab !== 'table'" class="flex-1 flex flex-col overflow-hidden">
        <app-results-table />
      </div>
    </section>
  </main>
</div>
